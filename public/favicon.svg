<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe08a"/>
      <stop offset="50%"  stop-color="#c8900c"/>
      <stop offset="100%" stop-color="#7a5006"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="10" fill="#100606"/>

  <!-- Outer decorative border -->
  <rect x="3" y="3" width="58" height="58" rx="7.5" fill="none" stroke="#5a1a08" stroke-width="1.5"/>

  <!-- Corner ornaments -->
  <polyline points="3,14 3,3 14,3"   fill="none" stroke="#8a2a10" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="50,3 61,3 61,14"  fill="none" stroke="#8a2a10" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="3,50 3,61 14,61"  fill="none" stroke="#8a2a10" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <polyline points="50,61 61,61 61,50" fill="none" stroke="#8a2a10" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- DoM text -->
  <text
    x="32"
    y="41"
    text-anchor="middle"
    font-family="Cinzel, 'Palatino Linotype', Palatino, Georgia, serif"
    font-weight="700"
    font-size="26"
    fill="url(#gold)"
    letter-spacing="1"
  >DoM</text>

  <!-- Decorative rule below text -->
  <line x1="10" y1="47" x2="54" y2="47" stroke="#5a1a08" stroke-width="1"/>
  <!-- Centre diamond on the rule -->
  <polygon points="32,44.5 34,47 32,49.5 30,47" fill="#8a2a10"/>
</svg>
